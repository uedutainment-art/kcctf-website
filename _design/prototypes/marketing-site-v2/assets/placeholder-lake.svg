<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EFF3"></stop>
      <stop offset="40%" stop-color="#D4DCE2"></stop>
      <stop offset="70%" stop-color="#9BB5C2"></stop>
      <stop offset="100%" stop-color="#6B9BB8"></stop>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B9BB8"></stop>
      <stop offset="50%" stop-color="#3E6B82"></stop>
      <stop offset="100%" stop-color="#1F3A4A"></stop>
    </linearGradient>
    <linearGradient id="goldhour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAF5" stop-opacity="0"></stop>
      <stop offset="60%" stop-color="#E8C25E" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.32"></stop>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.32" r="0.22">
