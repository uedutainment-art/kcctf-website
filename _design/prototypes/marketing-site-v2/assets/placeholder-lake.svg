  <line x1="0" y1="780" x2="1600" y2="780" stroke="#FDFAF5" stroke-opacity="0.08" stroke-width="1"></line>
  <line x1="0" y1="820" x2="1600" y2="820" stroke="#FDFAF5" stroke-opacity="0.05" stroke-width="1"></line>

  
