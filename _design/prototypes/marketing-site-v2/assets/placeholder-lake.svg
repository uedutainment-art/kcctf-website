  <path filter="url(#mist)" opacity="0.55" fill="#7A95A6" d="M0,540 L80,510 L180,495 L260,520 L340,490 L440,510 L540,478 L640,500 L740,470 L840,495 L940,475 L1040,505 L1140,485 L1240,510 L1340,480 L1440,500 L1540,485 L1600,500 L1600,560 L0,560 Z"></path>

  
