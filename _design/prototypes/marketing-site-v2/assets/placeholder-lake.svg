      <stop offset="40%" stop-color="#E8C25E" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#E8C25E" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="mist" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect width="1600" height="900" fill="url(#sky)"></rect>

  
